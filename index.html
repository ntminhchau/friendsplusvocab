    <style>
        :root { --primary: #a8e6cf; --secondary: #ffaaa5; --accent: #ffd3b6; --bg: #fdfcfb; --text: #4a4a4a; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px 10px; background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%); border-radius: 15px; margin-bottom: 15px; }
        h1 { margin: 0; color: #447061; font-size: 1.4rem; }
        header p { font-size: 1.1rem; font-weight: 700; margin: 8px 0 0; color: #d17a74; text-shadow: 1px 1px 0px white; }

        .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; position: sticky; top: 10px; z-index: 100; }
        .mode-switch { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .mode-btn { padding: 8px 15px; border-radius: 20px; border: 2px solid var(--primary); background: white; font-family: inherit; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .mode-btn.active { background: var(--primary); color: #447061; border-color: #88c9b0; }
        
        input, select { padding: 8px 15px; border: 2px solid var(--primary); border-radius: 20px; font-size: 0.9rem; outline: none; background: white; }

        .vocab-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 10px 5px; border: 1px solid #eee; position: relative; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; min-height: 45px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); }
        
        .card.expanded { grid-column: span 2; padding: 15px; border-color: var(--secondary); background: #fffafb; }
        .unit-tag { position: absolute; top: 3px; right: 5px; background: var(--secondary); color: white; padding: 1px 5px; border-radius: 8px; font-size: 0.5rem; font-weight: 700; }
        .word { font-size: 0.95rem; color: #ff8b94; font-weight: 700; }
        .card.expanded .word { font-size: 1.2rem; margin-bottom: 5px; color: #d17a74; border-bottom: 1px solid #ffaaa5; width: 100%; padding-bottom: 5px; }

        .details { display: none; width: 100%; margin-top: 10px; padding-top: 5px; text-align: left; animation: fadeIn 0.3s ease; }
        .card.expanded .details { display: block; }
        
        /* Word Form Table */
        .wf-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 5px; }
        .wf-table td { padding: 6px 4px; border-bottom: 1px solid #f0f0f0; }
        .wf-label { font-weight: 700; color: #557a95; width: 35%; }
        
        .ipa { color: #aaa; font-size: 0.8rem; margin-bottom: 5px; font-family: sans-serif; }
        .meaning { font-size: 0.9rem; color: #333; font-weight: 600; border-left: 4px solid var(--primary); padding-left: 8px; margin-bottom: 8px; }
        .example { font-style: italic; font-size: 0.8rem; color: #666; background: #fdf5f5; padding: 8px; border-radius: 8px; line-height: 1.4; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (min-width: 768px) {
            .vocab-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .controls { flex-direction: row; justify-content: center; }
            .card.expanded { grid-column: auto; }
        }
    </style>
</head>

function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-vocab').classList.toggle('active', mode === 'vocab');
    document.getElementById('btn-wf').classList.toggle('active', mode === 'wf');
    document.getElementById('guide-text').innerText = mode === 'vocab' ? "👇 Chạm để xem Nghĩa & Ví dụ nhé!" : "👇 Chạm để xem các dạng từ (N/V/Adj/Adv)";
    render();
}

function toggleCard(card) { card.classList.toggle('expanded'); }

function render() {
    const search = document.getElementById('searchBar').value.toLowerCase();
    const unit = document.getElementById('unitFilter').value;
    const grid = document.getElementById('mainGrid');
    
    let data = currentMode === 'vocab' ? vocabData : wordFormData;
    let filtered = data.filter(item => {
        const matchUnit = unit === 'all' || item.unit === unit;
        const matchSearch = item.word.toLowerCase().includes(search);
        return matchUnit && matchSearch;
    }).sort((a,b) => a.word.localeCompare(b.word));

    grid.innerHTML = filtered.map(item => {
        if (currentMode === 'vocab') {
            return `
                <div class="card" onclick="toggleCard(this)">
                    <span class="unit-tag">U${item.unit}</span>
                    <div class="word">${item.word}</div>
                    <div class="details">
                        <div class="ipa">${item.ipa}</div>
                        <div class="meaning">${item.meaning}</div>
                        <div class="example">" ${item.example} "</div>
                    </div>
                </div>`;
        } else {
            return `
                <div class="card" onclick="toggleCard(this)">
                    <span class="unit-tag">U${item.unit}</span>
                    <div class="word">${item.word}</div>
                    <div class="details">
                        <table class="wf-table">
                            <tr><td class="wf-label">Noun:</td><td>${item.n || '-'}</td></tr>
                            <tr><td class="wf-label">Verb:</td><td>${item.v || '-'}</td></tr>
                            <tr><td class="wf-label">Adj:</td><td>${item.adj || '-'}</td></tr>
                            <tr><td class="wf-label">Adv:</td><td>${item.adv || '-'}</td></tr>
                        </table>
                    </div>
                </div>`;
        }
    }).join('');
}

render();
</script>
