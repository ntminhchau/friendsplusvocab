function displayVocab(data) {
    const grid = document.getElementById('vocabGrid');
    grid.innerHTML = data.map(item => `
        <div class="card">
            <span class="unit-tag">${item.unit}</span>
            <div class="word">${item.word}</div>
            <div class="ipa">${item.ipa}</div>
            <div class="meaning">${item.meaning}</div>
            <div class="example">" ${item.example} "</div>
        </div>
    `).join('');
}

function filterVocab() {
    const searchText = document.getElementById('searchBar').value.toLowerCase();
    const selectedUnit = document.getElementById('unitFilter').value;
    const filtered = vocabData.filter(item => {
        const matchesSearch = item.word.toLowerCase().includes(searchText) || item.meaning.toLowerCase().includes(searchText);
        const matchesUnit = selectedUnit === "all" || item.unit === selectedUnit;
        return matchesSearch && matchesUnit;
    });
    displayVocab(filtered);
}
